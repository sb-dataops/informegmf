# Cloud Run env vars NO sensibles para producción.
# Los secretos van por --set-secrets en cloudbuild.yaml (Google Secret Manager).
#
# Si necesitas un cambio de configuración: edita esto, commit, redeploy.

BIGQUERY_PROJECT_ID: sbc-data-int
GCS_BUCKET_NAME: sb-relatorio-vendedor-gmf
RESEND_FROM_EMAIL: 'Superbid Exchange <informes@superbidcolombia.com>'

# Frontend URLs autorizados a CORS.
ALLOWED_ORIGINS: 'http://localhost:8080,https://informegmf.web.app,https://informegmf.firebaseapp.com'

NODE_ENV: production

# Audience que Cloud Scheduler debe firmar en sus OIDC tokens al hit /jobs/*.
# Debe coincidir con el --oidc-token-audience de cada job de Scheduler.
JOBS_OIDC_AUDIENCE: 'https://gmf-api.superbidcolombia.com'

# El email del SA que firma los OIDC tokens de Cloud Scheduler. Solo tokens
# con este `email` claim son aceptados en /jobs/*.
JOBS_OIDC_ALLOWED_EMAIL: 'gmf-scheduler@sbc-lovable.iam.gserviceaccount.com'
